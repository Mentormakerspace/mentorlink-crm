[build]
  base = "crm_frontend"
  command = "pnpm install && pnpm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "18"
  PNPM_VERSION = "8.15.4"
  NEXT_PUBLIC_API_URL = "/api"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[functions]
  directory = "netlify/functions"
