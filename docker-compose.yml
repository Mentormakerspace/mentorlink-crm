version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: crm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_password}
    ports:
      - "5432:5432"
    networks:
      - crm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./crm_backend
      dockerfile: Dockerfile # Assuming a Dockerfile exists in crm_backend
    container_name: crm_backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./crm_backend/.env # Load environment variables from .env file
    ports:
      - "5000:5000"
    volumes:
      - ./crm_backend:/app # Mount the backend code
    networks:
      - crm_network
    command: ["flask", "run", "--host=0.0.0.0"]
    restart: unless-stopped

  frontend:
    build:
      context: ./crm_frontend
      dockerfile: Dockerfile # Assuming a Dockerfile exists in crm_frontend
    container_name: crm_frontend
    depends_on:
      - backend
    env_file:
      - ./crm_frontend/.env.local # Load environment variables from .env.local
    ports:
      - "3000:3000"
    volumes:
      - ./crm_frontend:/app # Mount the frontend code
      - /app/node_modules # Don't mount node_modules from host
      - /app/.next # Don't mount .next from host
    networks:
      - crm_network
    command: ["pnpm", "start"]

networks:
  crm_network:
    driver: bridge

volumes:
  postgres_data:

