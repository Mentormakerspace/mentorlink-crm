   [build]
     command = "pnpm install --no-frozen-lockfile && pnpm run build"
     publish = ".next"

   [build.environment]
     NEXT_TELEMETRY_DISABLED = "1"
     NODE_VERSION = "18"
     PNPM_VERSION = "8.15.4"

   [[plugins]]
     package = "@netlify/plugin-nextjs"

[build]
  command = "cd crm_frontend && pnpm install && pnpm run build"
  publish = "crm_frontend/.next"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[functions]
  directory = "netlify/functions"